name: Build, test, and publish Docker Images

env:
  OWNER: inlabgeo
  COFI_IMAGE: cofi
  INLAB_IMAGE: inlab
  PLATFORMS: linux/amd64,linux/arm64

on:
  pull_request:
    paths:
      - ".github/workflows/docker.yml"
      - "image/**"
      - "tests/**"
      - "requirements-dev.txt"
      - "versions.txt"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docker.yml"
      - "image/**"
      - "tests/**"
      - "requirements-dev.txt"
      - "versions.txt"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-publish-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Dev Dependencies
        run: |
          pip install --upgrade pip
          pip install --upgrade -r requirements-dev.txt

      - name: Get commit sha, this will be used as a tag later on
        shell: bash
        run: |
          echo "sha12=$(echo ${GITHUB_SHA} | cut -c1-12)" >> "$GITHUB_OUTPUT"
        id: commit_sha

      - name: Read versions.txt, this will be used as tags later on
        run: |
          echo "cofi_version=$(awk -F= '/COFI_VERSION/{print $2}' versions.txt)" >> "$GITHUB_OUTPUT"
          echo "cofi_examples_version=$(awk -F= '/COFI_EXAMPLES_VERSION/{print $2}' versions.txt)" >> "$GITHUB_OUTPUT"
          echo "cofi_examples_version_tag=$(awk -F= '/COFI_EXAMPLES_VERSION/{print $2}' versions.txt | cut -c1-12)" >> "$GITHUB_OUTPUT"
        id: versions

      - name: Check retired package references
        run: python3 tests/test_removed_references.py

      - name: Build cofi image for tests
        run: |
          docker buildx build --load \
            --platform linux/amd64 \
            --target cofi \
            --tag ${{ env.OWNER }}/${{ env.COFI_IMAGE }}:latest \
            --build-arg COFI_VERSION=${{ steps.versions.outputs.cofi_version }} \
            --file image/Containerfile .
        env:
          BUILDKIT_PROGRESS: plain

      - name: Build inlab image for tests
        run: |
          docker buildx build --load \
            --platform linux/amd64 \
            --target inlab \
            --tag ${{ env.OWNER }}/${{ env.INLAB_IMAGE }}:latest \
            --build-arg COFI_VERSION=${{ steps.versions.outputs.cofi_version }} \
            --build-arg COFI_EXAMPLES_VERSION=${{ steps.versions.outputs.cofi_examples_version }} \
            --file image/Containerfile .
        env:
          BUILDKIT_PROGRESS: plain

      - name: Run tests
        run: python3 -m pytest tests

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ env.OWNER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push cofi multi-platform image
        if: github.ref == 'refs/heads/main'
        run: |
          docker buildx build --push \
            --platform ${{ env.PLATFORMS }} \
            --target cofi \
            --tag ${{ env.OWNER }}/${{ env.COFI_IMAGE }}:latest \
            --tag ${{ env.OWNER }}/${{ env.COFI_IMAGE }}:${{ steps.commit_sha.outputs.sha12 }} \
            --tag ${{ env.OWNER }}/${{ env.COFI_IMAGE }}:cofi-latest \
            --tag ${{ env.OWNER }}/${{ env.COFI_IMAGE }}:cofi-v${{ steps.versions.outputs.cofi_version }} \
            --build-arg COFI_VERSION=${{ steps.versions.outputs.cofi_version }} \
            --file image/Containerfile .
        env:
          BUILDKIT_PROGRESS: plain

      - name: Build and push inlab multi-platform image
        if: github.ref == 'refs/heads/main'
        run: |
          docker buildx build --push \
            --platform ${{ env.PLATFORMS }} \
            --target inlab \
            --tag ${{ env.OWNER }}/${{ env.INLAB_IMAGE }}:latest \
            --tag ${{ env.OWNER }}/${{ env.INLAB_IMAGE }}:${{ steps.commit_sha.outputs.sha12 }} \
            --tag ${{ env.OWNER }}/${{ env.INLAB_IMAGE }}:cofi-latest \
            --tag ${{ env.OWNER }}/${{ env.INLAB_IMAGE }}:cofi-v${{ steps.versions.outputs.cofi_version }} \
            --tag ${{ env.OWNER }}/${{ env.INLAB_IMAGE }}:cofi-examples-latest \
            --tag ${{ env.OWNER }}/${{ env.INLAB_IMAGE }}:cofi-examples-${{ steps.versions.outputs.cofi_examples_version_tag }} \
            --build-arg COFI_VERSION=${{ steps.versions.outputs.cofi_version }} \
            --build-arg COFI_EXAMPLES_VERSION=${{ steps.versions.outputs.cofi_examples_version }} \
            --file image/Containerfile .
        env:
          BUILDKIT_PROGRESS: plain
