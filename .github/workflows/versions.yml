name: Update versions

on:
  schedule:
    - cron: '43 21 * * *'
  workflow_dispatch:

jobs:
  update-versions:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Get latest versions
      run: |
        cofi_version=$(curl -sf 'https://pypi.org/pypi/cofi/json' | jq -r '.info.version')
        cofi_examples_version=$(curl -sf 'https://api.github.com/repos/inlab-geo/cofi-examples/commits/main' | jq -r '.sha')

        if [ -z "$cofi_version" ] || [ "$cofi_version" = "null" ]; then
          echo "::error::Failed to resolve COFI_VERSION from PyPI"
          exit 1
        fi
        if [ -z "$cofi_examples_version" ] || [ "$cofi_examples_version" = "null" ]; then
          echo "::error::Failed to resolve COFI_EXAMPLES_VERSION from GitHub"
          exit 1
        fi

        echo "COFI_VERSION=$cofi_version" > versions.txt
        echo "COFI_EXAMPLES_VERSION=$cofi_examples_version" >> versions.txt

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v8
      with:
        commit-message: "chore: update versions.txt"
        committer: GitHub Actions Bot <github-actions[bot]@users.noreply.github.com>
        author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
        branch: update-versions
        title: "Update `versions.txt`"
        body: |
          Update `versions.txt`.
          This pull request is auto-generated by [versions_update][1]

          [1]: https://github.com/inlab-geo/inlab-containers/blob/main/.github/workflows/versions.yml
        delete-branch: true
